<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#003c7d" />
    <meta name="description" content="Sistema de Atualização Cadastral dos Profissionais CNES - SEMUSA" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CNES - SEMUSA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Auto-reload quando um novo service worker for detectado
            reg.addEventListener('updatefound', () => {
              const novoSW = reg.installing;
              novoSW.addEventListener('statechange', () => {
                if (novoSW.state === 'installed' && navigator.serviceWorker.controller) {
                  // Nova versão disponível — recarrega para ativar
                  window.location.reload();
                }
              });
            });
          }).catch((err) => {
            console.error('Erro ao registrar Service Worker:', err);
          });
        });
      }
    </script>
  </body>
</html>
