<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#003c7d" />
    <meta name="description" content="Sistema de Atualização Cadastral dos Profissionais CNES - SEMUSA" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CNES - SEMUSA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Pequeno delay para estabilizar a navegação antes de registrar o SW
          setTimeout(() => {
            navigator.serviceWorker.register('/sw.js').then((reg) => {
              reg.addEventListener('updatefound', () => {
                const novoSW = reg.installing || reg.waiting;
                if (novoSW) {
                  novoSW.addEventListener('statechange', () => {
                    if (novoSW.state === 'installed' && navigator.serviceWorker.controller) {
                      window.location.reload();
                    }
                  });
                }
              });
            }).catch((err) => {
              // AbortError é comum durante navegação/descarregamento — ignora silenciosamente
              if (err.name !== 'AbortError') {
                console.error('Erro ao registrar Service Worker:', err);
              }
            });
          }, 300);
        });
      }
    </script>
  </body>
</html>
